<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gerenciamento de Usuários - ArbTrade">
    <meta name="theme-color" content="#0d1117">
    <title>Gerenciamento de Usuários - ArbTrade</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .user-management-section {
            max-width: var(--content-max-width);
            margin: 0 auto;
            padding: 0 1rem;
        }
        .user-form-container {
            background: var(--bg-elevated);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-xl);
            padding: 1.75rem;
            margin-top: 1.75rem;
            backdrop-filter: blur(18px);
        }
        .user-list {
            display: grid;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .user-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-lg);
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background var(--transition-base), border-color var(--transition-base), transform var(--transition-base);
            gap: 1.5rem;
        }
        .user-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-subtle);
            transform: translateY(-1px);
        }
        .user-info {
            flex: 1;
            min-width: 0;
        }
        .user-name {
            font-size: 1.0625rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.375rem;
        }
        .user-details {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.375rem;
            line-height: 1.4;
        }
        .user-status {
            font-size: 0.8125rem;
            margin-top: 0.5rem;
            font-weight: 500;
        }
        .user-actions {
            display: flex;
            gap: 0.625rem;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .user-actions button {
            font-size: 0.875rem;
            padding: 0.5rem 0.875rem;
            border-radius: 10px;
        }
        #user-form-feedback {
            margin-top: 1rem;
            font-size: 0.875rem;
        }
        .empty {
            color: var(--text-secondary);
            padding: 2rem;
            text-align: center;
        }
        @media (max-width: 768px) {
            .user-card {
                flex-direction: column;
                align-items: flex-start;
            }
            .user-actions {
                width: 100%;
                justify-content: flex-start;
            }
        }
    </style>
    <script src="/js/config.js"></script>
</head>
<body>
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <main class="shell">
        <section class="hero">
            <div class="hero-top">
                <div>
                    <div class="eyebrow">Configurações</div>
                    <h1>Gerenciamento de Usuários</h1>
                </div>
                <div class="hero-status-group">
                    <a href="/" class="secondary" style="text-decoration: none; padding: 10px 20px; display: inline-block;">← Voltar ao Painel</a>
                </div>
            </div>
            <p>Cadastre e gerencie os usuários com acesso ao painel de arbitragem.</p>
        </section>

        <section class="workspace-section">
            <div class="section-heading">
                <div>
                    <div class="eyebrow">CRUD</div>
                    <h2>Usuários</h2>
                </div>
                <button class="primary" id="btn-show-user-form" type="button">Novo Usuário</button>
            </div>

            <div class="user-form-container" id="user-form-container" style="display: none;">
                <form id="user-form" class="data-form">
                    <div class="form-header">
                        <h3 id="user-form-title">Cadastrar Usuário</h3>
                        <p id="user-form-hint">Preencha os dados para criar um novo usuário.</p>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="username">Username *</label>
                            <input type="text" id="username" name="username" required placeholder="Identificação única" autocomplete="username">
                        </div>
                        <div class="form-group">
                            <label for="name">Nome Completo *</label>
                            <input type="text" id="name" name="name" required placeholder="Nome completo" autocomplete="name">
                        </div>
                        <div class="form-group">
                            <label for="mail">Email *</label>
                            <input type="email" id="mail" name="mail" required placeholder="email@dominio.com" autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label for="password">Senha *</label>
                            <input type="password" id="password" name="password" required minlength="6" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                        </div>
                    </div>
                    <label class="toggle-field" for="stopTrader">
                        <input type="checkbox" id="stopTrader" name="stopTrader">
                        <span>Parar operações deste usuário</span>
                    </label>
                    <div class="form-actions">
                        <button type="submit" class="primary" id="btn-submit-user">Salvar</button>
                        <button type="button" class="secondary" id="btn-cancel-user-form">Cancelar</button>
                    </div>
                    <div id="user-form-feedback" class="mono form-feedback" role="status" aria-live="polite"></div>
                </form>
            </div>

            <div class="exchange-summary-grid">
                <article class="summary-chip">
                    <span class="summary-chip-label">Total</span>
                    <strong id="user-total-count">0</strong>
                </article>
                <article class="summary-chip">
                    <span class="summary-chip-label">Ativos</span>
                    <strong id="user-active-count">0</strong>
                </article>
                <article class="summary-chip">
                    <span class="summary-chip-label">Parados</span>
                    <strong id="user-stopped-count">0</strong>
                </article>
            </div>

            <div id="user-list" class="user-list" aria-label="Lista de usuários">
                <div class="empty">Carregando usuários...</div>
            </div>
        </section>
    </main>

    <script>
        'use strict';

        // Toast helper
        function showToast(message, type = 'info', duration = 4000) {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.setAttribute('role', 'alert');
            toast.innerHTML = `
                <span class="toast-icon" aria-hidden="true">${icons[type] || icons.info}</span>
                <span class="toast-message">${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('toast-out');
                setTimeout(() => toast.parentNode?.removeChild(toast), 300);
            }, duration);
        }

        // Elementos do DOM
        const btnShowUserForm = document.getElementById('btn-show-user-form');
        const userFormContainer = document.getElementById('user-form-container');
        const userForm = document.getElementById('user-form');
        const btnCancelUserForm = document.getElementById('btn-cancel-user-form');
        const userFormFeedback = document.getElementById('user-form-feedback');
        const userList = document.getElementById('user-list');
        const userIdInput = document.getElementById('user-id');
        const btnSubmitUser = document.getElementById('btn-submit-user');
        const userFormTitle = document.getElementById('user-form-title');
        const userFormHint = document.getElementById('user-form-hint');

        let editingUsername = null;

        // Toggle form visibility
        if (btnShowUserForm && userFormContainer) {
            btnShowUserForm.addEventListener('click', () => {
                const isHidden = userFormContainer.style.display === 'none' || userFormContainer.style.display === '';
                userFormContainer.style.display = isHidden ? 'block' : 'none';
                if (!isHidden) resetForm();
            });
        }

        function resetForm() {
            if (userForm) userForm.reset();
            if (userIdInput) userIdInput.value = '';
            if (userFormFeedback) {
                userFormFeedback.textContent = '';
                userFormFeedback.className = 'mono form-feedback';
            }
            if (btnSubmitUser) btnSubmitUser.textContent = 'Salvar';
            if (userFormTitle) userFormTitle.textContent = 'Cadastrar Usuário';
            if (userFormHint) userFormHint.textContent = 'Preencha os dados para criar um novo usuário.';
            editingUsername = null;
        }

        if (btnCancelUserForm && userFormContainer) {
            btnCancelUserForm.addEventListener('click', () => {
                userFormContainer.style.display = 'none';
                resetForm();
            });
        }

        // Submit form
        if (userForm) {
            userForm.addEventListener('submit', async (event) => {
                event.preventDefault();

                const formData = new FormData(userForm);
                const userData = {
                    username: formData.get('username')?.trim(),
                    name: formData.get('name')?.trim(),
                    mail: formData.get('mail')?.trim(),
                    password: formData.get('password'),
                    stopTrader: formData.get('stopTrader') === 'on'
                };

                // Validação
                if (!userData.username || !userData.name || !userData.mail || !userData.password) {
                    userFormFeedback.textContent = 'Todos os campos obrigatórios devem ser preenchidos.';
                    userFormFeedback.className = 'mono form-feedback';
                    return;
                }

                if (userData.password.length < 6) {
                    userFormFeedback.textContent = 'A senha deve ter pelo menos 6 caracteres.';
                    userFormFeedback.className = 'mono form-feedback';
                    return;
                }

                userFormFeedback.textContent = 'Salvando...';
                userFormFeedback.className = 'mono form-feedback';
                btnSubmitUser.disabled = true;

                try {
                    const isEdit = !!editingUsername;
                    const baseUrl = window.API_URL || '';
                    const path = isEdit ? `users/${encodeURIComponent(editingUsername)}` : 'users';
                    const url = baseUrl ? `${baseUrl}/api/${path}` : `/api/${path}`;
                    const method = isEdit ? 'PUT' : 'POST';

                    const response = await fetch(url, {
                        method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userData)
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(result.error || `Falha ao ${isEdit ? 'atualizar' : 'criar'} usuário`);
                    }

                    showToast(isEdit ? 'Usuário atualizado com sucesso!' : 'Usuário criado com sucesso!', 'success');
                    resetForm();

                    setTimeout(() => {
                        userFormContainer.style.display = 'none';
                    }, 500);

                    loadUsers();
                } catch (error) {
                    userFormFeedback.textContent = error.message;
                    userFormFeedback.className = 'mono form-feedback';
                    showToast(error.message, 'error');
                } finally {
                    btnSubmitUser.disabled = false;
                }
            });
        }

        // Load users
        async function loadUsers() {
            if (!userList) return;

            try {
                const baseUrl = window.API_URL || '';
                const response = await fetch(`${baseUrl}/api/users`);
                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Falha ao carregar usuários');
                }

                const users = Array.isArray(result.users) ? result.users : [];

                document.getElementById('user-total-count').textContent = users.length;
                document.getElementById('user-active-count').textContent = users.filter(u => !u.stopTrader).length;
                document.getElementById('user-stopped-count').textContent = users.filter(u => u.stopTrader).length;

                if (users.length === 0) {
                    userList.innerHTML = '<div class="empty">Nenhum usuário cadastrado ainda.</div>';
                    return;
                }

                userList.innerHTML = users.map(user => `
                    <div class="user-card" style="${user.stopTrader ? 'opacity: 0.6;' : ''}">
                        <div class="user-info">
                            <div class="user-name">@${escapeHtml(user.username)}</div>
                            <div class="user-details">${escapeHtml(user.name)} · ${escapeHtml(user.mail)}</div>
                            <div class="user-status" style="color: ${user.stopTrader ? 'var(--danger)' : 'var(--accent)'};">
                                ● ${user.stopTrader ? 'Operações paradas' : 'Ativo'}
                            </div>
                        </div>
                        <div class="user-actions">
                            <button class="secondary" onclick="editUser('${escapeHtml(user.username)}')" type="button">Editar</button>
                            <button class="secondary" onclick="toggleUserStatus('${escapeHtml(user.username)}', ${!user.stopTrader})" type="button">
                                ${user.stopTrader ? 'Ativar' : 'Parar'}
                            </button>
                            <button class="secondary button-danger" onclick="deleteUser('${escapeHtml(user.username)}')" type="button">
                                Excluir
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                userList.innerHTML = `<div class="empty">Erro ao carregar usuários: ${escapeHtml(error.message)}</div>`;
                showToast(error.message, 'error');
            }
        }

        // Edit user
        async function editUser(username) {
            try {
                const baseUrl = window.API_URL || '';
                const response = await fetch(`${baseUrl}/api/users/${encodeURIComponent(username)}`);
                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Falha ao carregar dados do usuário');
                }

                const user = result.user;
                editingUsername = user.username;

                document.getElementById('username').value = user.username || '';
                document.getElementById('name').value = user.name || '';
                document.getElementById('mail').value = user.mail || '';
                document.getElementById('password').value = user.password || '';
                document.getElementById('stopTrader').checked = user.stopTrader || false;

                userFormContainer.style.display = 'block';
                if (btnSubmitUser) btnSubmitUser.textContent = 'Atualizar';
                if (userFormTitle) userFormTitle.textContent = `Editar ${user.username}`;
                if (userFormHint) userFormHint.textContent = 'Atualize os dados do usuário.';
                if (userFormFeedback) {
                    userFormFeedback.textContent = 'Modo de edição ativado';
                    userFormFeedback.className = 'mono form-feedback';
                }

                userFormContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch (error) {
                showToast(`Erro ao carregar usuário: ${error.message}`, 'error');
            }
        }

        // Toggle user status
        async function toggleUserStatus(username, newStatus) {
            try {
                const baseUrl = window.API_URL || '';
                const response = await fetch(`${baseUrl}/api/users/${encodeURIComponent(username)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stopTrader: newStatus })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Falha ao atualizar status do usuário');
                }

                showToast(`Usuário ${newStatus ? 'pausado' : 'ativado'} com sucesso!`, 'success');
                loadUsers();
            } catch (error) {
                showToast(`Erro ao atualizar usuário: ${error.message}`, 'error');
            }
        }

        // Delete user
        async function deleteUser(username) {
            if (!confirm(`Tem certeza que deseja excluir o usuário "${username}"?\n\nEsta ação não pode ser desfeita.`)) {
                return;
            }

            try {
                const baseUrl = window.API_URL || '';
                const response = await fetch(`${baseUrl}/api/users/${encodeURIComponent(username)}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Falha ao excluir usuário');
                }

                showToast('Usuário excluído com sucesso!', 'success');
                loadUsers();
            } catch (error) {
                showToast(`Erro ao excluir usuário: ${error.message}`, 'error');
            }
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, function(m) {
                if (m === '&') return String.fromCharCode(38) + 'amp;';
                if (m === '<') return String.fromCharCode(38) + 'lt;';
                if (m === '>') return String.fromCharCode(38) + 'gt;';
                if (m === '"') return String.fromCharCode(38) + 'quot;';
                if (m === "'") return String.fromCharCode(38) + '#39;';
                return m;
            });
        }

        // Inicializar
        loadUsers();
    </script>
</body>
</html>
