<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross-Market Execution - ArbTrade</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <main class="shell">
                <section class="hero">
                    <div class="hero-top">
                        <div>
                            <div class="eyebrow">Execução</div>
                            <h1>Cross-Market Execution</h1>
                        </div>
                        <div class="hero-status-group">
                            <div class="status-pill" id="cm-exec-status">
                                <span class="status-dot" id="cm-exec-dot"></span>
                                <span id="cm-exec-label">Inicializando...</span>
                            </div>
                        </div>
                    </div>
                    <p>Acompanhamento em tempo real das execuções de arbitragem cross-market.</p>
                    <div class="actions">
                        <button class="primary" id="cm-exec-run-all" type="button">Executar Todas</button>
                        <button class="secondary" id="cm-exec-listen-all" type="button">Escutar Todas</button>
                        <button class="secondary" id="cm-exec-refresh" type="button">Atualizar</button>
                    </div>
                    <span id="cm-exec-feedback" class="mono hero-feedback" role="status" aria-live="polite"></span>
                </section>

                <section class="workspace-section">
                    <div class="section-heading">
                        <div>
                            <div class="eyebrow">Execução</div>
                            <h2>Cross-Market</h2>
                        </div>
                        <p>Painéis de execução e acompanhamento de oportunidades por estratégia.</p>
                    </div>
                    <section class="exchange-grid" id="cm-exec-grid"></section>
                </section>
            </main>

    <script src="/js/config.js"></script>
    <script type="module" src="/app.js"></script>
    <script type="module">
        import {
            buildApiUrl,
            escapeHtml,
            formatDateTime,
            formatNumber,
            getExchangeTitle,
            getVisibleExchanges,
            fetchJson
        } from './js/shared.js';

        const execGrid = document.getElementById('cm-exec-grid');
        const execFeedback = document.getElementById('cm-exec-feedback');
        const execStatusLabel = document.getElementById('cm-exec-label');
        const execStatusDot = document.getElementById('cm-exec-dot');
        const runAllButton = document.getElementById('cm-exec-run-all');
        const listenAllButton = document.getElementById('cm-exec-listen-all');
        const refreshButton = document.getElementById('cm-exec-refresh');

        const executionViews = new Map();
        const activeSubscriptions = new Set();
        let strategies = [];

        function getSubscribedCount() {
            return strategies.filter((s) => activeSubscriptions.has(s._id)).length;
        }

        function updateListenAllButton() {
            const subscribedCount = getSubscribedCount();
            const allSubscribed = strategies.length > 0 && subscribedCount === strategies.length;

            listenAllButton.textContent = allSubscribed ? 'Parar escuta de todas' : 'Escutar todas';
            listenAllButton.className = allSubscribed ? 'primary' : 'secondary';
        }

        function updateStatusLabel() {
            const activeCount = activeSubscriptions.size;
            if (activeCount > 0) {
                execStatusDot.style.background = 'var(--accent)';
                execStatusDot.style.boxShadow = 'var(--shadow-glow-accent)';
                execStatusLabel.textContent = `${activeCount} execução(ões) ativa(s)`;
            } else {
                execStatusDot.style.background = 'var(--warn)';
                execStatusDot.style.boxShadow = 'var(--shadow-glow-warn)';
                execStatusLabel.textContent = 'Nenhuma execução ativa';
            }
        }

        function createExecutionPanelMarkup(strategy) {
            return `
                <article class="exchange-panel" data-strategy-id="${strategy._id}">
                    <div class="exchange-panel-top">
                        <div>
                            <p class="route">${escapeHtml(strategy.name)}</p>
                            <span style="font-size: 0.85rem; color: var(--text-secondary); display: block; margin-top: 4px;">
                                ${escapeHtml(strategy.exchange1)} ➔ ${escapeHtml(strategy.exchange2)} (${escapeHtml(strategy.asset1)}/${escapeHtml(strategy.asset2)})
                            </span>
                            <div class="exchange-feedback mono" data-role="exec-feedback" style="margin-top: 8px;">Aguardando execução...</div>
                        </div>
                        <div class="actions actions-compact">
                            <button class="secondary" data-role="exec-toggle">Executar</button>
                            <button class="secondary" data-role="exec-refresh">Atualizar</button>
                        </div>
                    </div>
                    <div class="exchange-status-meta">
                        <article class="status-card">
                            <span class="status-card-label">Última atualização</span>
                            <span class="status-card-value" data-role="last-update">Aguardando...</span>
                        </article>
                        <article class="status-card">
                            <span class="status-card-label">Status</span>
                            <span class="status-card-value" data-role="exec-status">Inativo</span>
                        </article>
                        <article class="status-card">
                            <span class="status-card-label">Oportunidades</span>
                            <span class="status-card-value" data-role="opportunities-count">0</span>
                        </article>
                    </div>
                    <section class="panel exchange-section">
                        <h2>Métricas</h2>
                        <div class="metrics" data-role="metrics">
                            <div class="empty">Sem dados de execução ainda.</div>
                        </div>
                    </section>
                    <div class="grid exchange-panel-grid">
                        <div class="stack">
                            <details class="panel exchange-section accordion-item section-accordion">
                                <summary class="accordion-summary section-accordion-summary">
                                    <span>
                                        <span class="accordion-title">Execuções Recentes</span>
                                        <span class="accordion-subtitle">Operações de arbitragem executadas recentemente.</span>
                                    </span>
                                </summary>
                                <div class="accordion-body">
                                    <div class="cards" data-role="exec-history"></div>
                                </div>
                            </details>
                        </div>
                        <div class="stack">
                            <details class="panel exchange-section accordion-item section-accordion">
                                <summary class="accordion-summary section-accordion-summary">
                                    <span>
                                        <span class="accordion-title">Logs</span>
                                        <span class="accordion-subtitle">Registros detalhados de rastreamento e varreduras.</span>
                                    </span>
                                </summary>
                                <div class="accordion-body">
                                    <div class="cards" data-role="logs"></div>
                                </div>
                            </details>
                        </div>
                    </div>
                </article>
            `;
        }

        async function backendRequest(action, strategyId) {
            let url;
            switch (action) {
                case 'cross-market-status':
                    url = buildApiUrl(`cross-market/status`);
                    break;
                case 'cross-market-execute':
                    url = buildApiUrl(`cross-market/${strategyId}/execute`);
                    break;
                case 'cross-market-subscribe':
                    url = buildApiUrl(`cross-market/${strategyId}/subscribe`);
                    break;
                case 'cross-market-unsubscribe':
                    url = buildApiUrl(`cross-market/${strategyId}/unsubscribe`);
                    break;
                default:
                    throw new Error(`Ação não suportada: ${action}`);
            }

            return await fetchJson(url, { method: 'GET' });
        }

        function renderMetrics(view, data) {
            if (!data) {
                view.metrics.innerHTML = '<div class="empty">Sem dados de execução ainda.</div>';
                return;
            }

            const metrics = [
                { label: 'Estratégias Ativas', value: data.activeStrategies || 0 },
                { label: 'Scans Rodando', value: data.runningScans || 0 },
                { label: 'Oportunidades', value: data.opportunities || 0 }
            ];

            view.metrics.innerHTML = metrics.map((m) =>
                `<div class="metric-card"><span class="metric-label">${m.label}</span><span class="metric-value">${m.value}</span></div>`
            ).join('');
        }

        function renderExecutionHistory(view, items) {
            if (!Array.isArray(items) || items.length === 0) {
                view.execHistory.innerHTML = '<div class="empty">Nenhuma execução recente.</div>';
                return;
            }

            view.execHistory.innerHTML = items.map((item) => `
                <article class="log-card">
                    <p class="route">${new Date(item.timestamp).toLocaleString()}</p>
                    <div class="row"><span>Estratégia</span><strong>${escapeHtml(item.strategyName)}</strong></div>
                    <div class="row"><span>Status</span><strong>${item.status || 'n/a'}</strong></div>
                    <div class="row"><span>Spread</span><strong class="positive">${formatNumber(item.spreadPercent, 4)}%</strong></div>
                    <div class="row"><span>Lucro Estimado</span><strong>${formatNumber(item.estimatedProfit, 4)}</strong></div>
                </article>
            `).join('');
        }

        function renderLogs(view, items) {
            if (!Array.isArray(items) || items.length === 0) {
                view.logs.innerHTML = '<div class="empty">Nenhum log disponível.</div>';
                return;
            }

            view.logs.innerHTML = items.map((item) => `
                <article class="log-card">
                    <p class="route">${new Date(item.timestamp).toLocaleString()}</p>
                    <div class="row"><span>Mensagem</span><strong>${escapeHtml(item.message)}</strong></div>
                    ${item.data ? `<pre class="mono">${escapeHtml(JSON.stringify(item.data, null, 2))}</pre>` : ''}
                </article>
            `).join('');
        }

        async function loadExecution(strategyId) {
            const view = executionViews.get(strategyId);
            if (!view) return;

            view.refreshButton.disabled = true;
            view.feedback.textContent = 'Atualizando...';

            try {
                // Carregar status do cross-market
                const statusResponse = await backendRequest('cross-market-status', strategyId);
                const statusData = statusResponse.status || statusResponse;
                
                // Buscar logs filtrados por strategyId
                const logsData = await fetchJson(buildApiUrl(`cross-market/logs?limit=50&strategyId=${strategyId}`))
                    .catch(() => ({ logs: [] }));

                const strategyStatus = (statusData.strategies || []).find(s => String(s.id) === String(strategyId));
                const isRunning = strategyStatus ? strategyStatus.isRunning : false;

                view.lastUpdate.textContent = formatDateTime(new Date().toISOString());
                view.statusText.textContent = isRunning ? 'Ativo' : 'Inativo';
                view.opportunitiesCount.textContent = statusData.opportunities || 0;
                renderMetrics(view, statusData);
                renderExecutionHistory(view, (statusData.recentExecutions || []).filter(item => item.strategyId === strategyId || item.strategyName === view.strategyName));
                renderLogs(view, logsData.logs || []);
                
                if (isRunning) {
                    activeSubscriptions.add(strategyId);
                    view.toggleButton.textContent = 'Parar Execução';
                    view.toggleButton.className = 'primary';
                } else {
                    activeSubscriptions.delete(strategyId);
                    view.toggleButton.textContent = 'Executar';
                    view.toggleButton.className = 'secondary';
                }
                updateStatusLabel();
                updateListenAllButton();
                view.feedback.textContent = 'Painel atualizado.';
            } catch (error) {
                view.feedback.textContent = error.message;
            } finally {
                view.refreshButton.disabled = false;
            }
        }

        async function executeCrossMarket(strategyId) {
            const view = executionViews.get(strategyId);
            if (!view) return;

            view.runButton.disabled = true;
            view.feedback.textContent = 'Executando...';

            try {
                const result = await backendRequest('cross-market-execute', strategyId);
                view.feedback.textContent = result.message || 'Execução concluída.';
                view.lastUpdate.textContent = formatDateTime(new Date().toISOString());
                await loadExecution(strategyId);
            } catch (error) {
                view.feedback.textContent = error.message;
            } finally {
                view.runButton.disabled = false;
            }
        }

        async function toggleSubscription(strategyId) {
            const view = executionViews.get(strategyId);
            if (!view) return;

            view.toggleButton.disabled = true;

            try {
                if (activeSubscriptions.has(strategyId)) {
                    await backendRequest('cross-market-unsubscribe', strategyId);
                    activeSubscriptions.delete(strategyId);
                    view.feedback.textContent = 'Execução interrompida.';
                    view.toggleButton.textContent = 'Executar';
                    view.toggleButton.className = 'secondary';
                } else {
                    const result = await backendRequest('cross-market-subscribe', strategyId);
                    activeSubscriptions.add(strategyId);
                    view.feedback.textContent = result.message || 'Execução ativada.';
                    view.toggleButton.textContent = 'Parar Execução';
                    view.toggleButton.className = 'primary';
                }
                updateStatusLabel();
                updateListenAllButton();
            } catch (error) {
                view.feedback.textContent = error.message;
            } finally {
                view.toggleButton.disabled = false;
            }
        }

        async function toggleListenAll() {
            if (strategies.length === 0) return;
            const allSubscribed = strategies.every((s) => activeSubscriptions.has(s._id));

            listenAllButton.disabled = true;
            listenAllButton.textContent = allSubscribed ? 'Parando...' : 'Ativando...';

            try {
                if (allSubscribed) {
                    await Promise.all(strategies.map((s) => backendRequest('cross-market-unsubscribe', s._id)));
                    strategies.forEach((s) => activeSubscriptions.delete(s._id));
                    execFeedback.textContent = 'Escuta interrompida em todas.';
                } else {
                    const targets = strategies.filter((s) => !activeSubscriptions.has(s._id));
                    await Promise.all(targets.map((s) => backendRequest('cross-market-subscribe', s._id)));
                    targets.forEach((s) => activeSubscriptions.add(s._id));
                    execFeedback.textContent = 'Escuta ativada em todas as estratégias.';
                }
                updateStatusLabel();
                updateListenAllButton();
            } catch (error) {
                execFeedback.textContent = error.message;
            } finally {
                listenAllButton.disabled = false;
            }
        }

        async function runAllExecutions() {
            if (strategies.length === 0) return;
            runAllButton.disabled = true;
            execFeedback.textContent = 'Executando todas...';

            try {
                await Promise.allSettled(strategies.map((s) => executeCrossMarket(s._id)));
                execFeedback.textContent = 'Execução concluída.';
            } catch (error) {
                execFeedback.textContent = error.message;
            } finally {
                runAllButton.disabled = false;
            }
        }

        async function refreshAll() {
            if (strategies.length === 0) return;
            refreshButton.disabled = true;
            execFeedback.textContent = 'Atualizando...';

            try {
                await Promise.all(strategies.map((s) => loadExecution(s._id)));
                execFeedback.textContent = 'Painéis atualizados.';
            } catch (error) {
                execFeedback.textContent = error.message;
            } finally {
                refreshButton.disabled = false;
            }
        }

        async function initializeExecutionPanels() {
            execFeedback.textContent = 'Carregando estratégias...';
            try {
                const response = await fetchJson(buildApiUrl('cross-market'));
                strategies = response.strategies || [];

                if (strategies.length === 0) {
                    execGrid.innerHTML = '<div class="empty cm-full">Nenhuma estratégia cross-market em execução no momento. Ative uma na página "Configuração" para acompanhar.</div>';
                    execFeedback.textContent = '';
                    updateListenAllButton();
                    updateStatusLabel();
                    return;
                }

                execGrid.innerHTML = strategies.map(createExecutionPanelMarkup).join('');
                executionViews.clear();

                strategies.forEach((strategy) => {
                    const root = execGrid.querySelector(`[data-strategy-id="${strategy._id}"]`);
                    const view = {
                        strategyId: strategy._id,
                        strategyName: strategy.name,
                        root,
                        feedback: root.querySelector('[data-role="exec-feedback"]'),
                        lastUpdate: root.querySelector('[data-role="last-update"]'),
                        statusText: root.querySelector('[data-role="exec-status"]'),
                        opportunitiesCount: root.querySelector('[data-role="opportunities-count"]'),
                        metrics: root.querySelector('[data-role="metrics"]'),
                        execHistory: root.querySelector('[data-role="exec-history"]'),
                        logs: root.querySelector('[data-role="logs"]'),
                        toggleButton: root.querySelector('[data-role="exec-toggle"]'),
                        refreshButton: root.querySelector('[data-role="exec-refresh"]')
                    };

                    view.toggleButton.addEventListener('click', () => toggleSubscription(strategy._id));
                    view.refreshButton.addEventListener('click', () => loadExecution(strategy._id));

                    executionViews.set(strategy._id, view);
                });

                updateListenAllButton();
                updateStatusLabel();
                execFeedback.textContent = '';
            } catch (err) {
                execGrid.innerHTML = `<div class="empty cm-full" style="color: var(--danger);">Falha ao carregar estratégias: ${err.message}</div>`;
                execFeedback.textContent = '';
            }
        }

        if (runAllButton) {
            runAllButton.addEventListener('click', runAllExecutions);
        }

        if (listenAllButton) {
            listenAllButton.addEventListener('click', toggleListenAll);
        }

        if (refreshButton) {
            refreshButton.addEventListener('click', refreshAll);
        }

        window.addEventListener('load-dashboard', () => {
            initializeExecutionPanels().then(() => {
                strategies.forEach((s) => loadExecution(s._id).catch(() => {}));
            });
        });

        window.addEventListener('init-panels', () => {
            initializeExecutionPanels().then(() => {
                strategies.forEach((s) => loadExecution(s._id).catch(() => {}));
            });
        });

        initializeExecutionPanels().then(() => {
            strategies.forEach((s) => loadExecution(s._id).catch(() => {}));
        });
    </script>
</body>
</html>
